<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>League Table</title>
    <link rel="stylesheet" href="styles/table.css">
</head>
<body>

<table class="league-table">
    <thead>
        <tr>
            <th>League</th>
            <th>Team</th>
            <th>Record</th>
            <th>Player Count</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td rowspan="2" class="league">Southern</td>
            <td>Parana</td>
            <td>52-19</td>
            <td>23</td>
        </tr>
        <tr class="alt">
            <td>Catarina</td>
            <td>49-24</td>
            <td>10</td>
        </tr>

        <tr>
            <td rowspan="3" class="league">Western</td>
            <td>Lacerda</td>
            <td>92-70</td>
            <td>27</td>
        </tr>
        <tr class="alt">
            <td>Acre</td>
            <td>75-87</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Rondonia</td>
            <td>10-7</td>
            <td>12</td>
        </tr>

        <tr class="total">
            <td colspan="3">Total Players</td>
            <td>92</td>
        </tr>
    </tbody>
</table>

</body>
</html>
